<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}校园二手交易平台数据库系统{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="site-shell">
        <header class="site-header">
            <a class="brand" href="/">校园二手交易平台数据库系统</a>
            <nav class="site-nav" aria-label="全站导航">
                <a href="/" {% if request.path == '/' %}class="is-active"{% endif %}>首页</a>
                <a href="/items" {% if request.path == '/items' %}class="is-active"{% endif %}>商品列表</a>
                <a href="/users" {% if request.path == '/users' %}class="is-active"{% endif %}>用户列表</a>
                <a href="/orders" {% if request.path == '/orders' %}class="is-active"{% endif %}>订单列表</a>
            </nav>
        </header>

        <main class="content-shell">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
